# Clones AI-ESPRESSO, runs scripts/sync-espresso.mjs --variant c, commits editions/ if changed.
# Schedule: daily ~8:00 AM Eastern (about one hour after the edition publish ~7:00 AM ET).
# GitHub cron is UTC-only: 12:00 UTC ≈ 8:00 AM EDT / 7:00 AM EST.
# Private source: set repo variable AI_ESPRESSO_REPOSITORY and secret AI_ESPRESSO_CLONE_TOKEN.

name: Sync AI Espresso editions

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

concurrency:
  group: sync-espresso-editions
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Clone AI-ESPRESSO
        env:
          AI_ESPRESSO_REPOSITORY: ${{ vars.AI_ESPRESSO_REPOSITORY }}
          AI_ESPRESSO_CLONE_TOKEN: ${{ secrets.AI_ESPRESSO_CLONE_TOKEN }}
        run: |
          set -euo pipefail
          REPO="${AI_ESPRESSO_REPOSITORY:-jackiehimel/AI-ESPRESSO}"
          DEST="${GITHUB_WORKSPACE}/AI-ESPRESSO"
          if [ -n "${AI_ESPRESSO_CLONE_TOKEN:-}" ]; then
            git clone --depth 1 "https://x-access-token:${AI_ESPRESSO_CLONE_TOKEN}@github.com/${REPO}.git" "$DEST"
          else
            git clone --depth 1 "https://github.com/${REPO}.git" "$DEST"
          fi

      - name: Run sync
        env:
          AI_ESPRESSO_REPOSITORY: ${{ vars.AI_ESPRESSO_REPOSITORY }}
        run: |
          set -euo pipefail
          REPO="${AI_ESPRESSO_REPOSITORY:-jackiehimel/AI-ESPRESSO}"
          node scripts/sync-espresso.mjs \
            --source "${GITHUB_WORKSPACE}/AI-ESPRESSO" \
            --variant c \
            --source-repo "$REPO"

      - name: Commit and push if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add editions
          if git diff --staged --quiet; then
            echo "No changes under editions/; nothing to commit."
            exit 0
          fi
          git commit -m "chore: sync ai espresso editions from AI-ESPRESSO"
          git push
