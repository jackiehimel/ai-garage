# Pulls latest AI Espresso manifest/artifacts (no source repo clone).
# Schedule: daily ~8:00 AM Eastern (about one hour after the edition publish ~7:00 AM ET).
# GitHub cron is UTC-only: 12:00 UTC ≈ 8:00 AM EDT / 7:00 AM EST.
# Override source manifest with repo variable AI_ESPRESSO_MANIFEST_URL.

name: Sync AI Espresso editions

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

concurrency:
  group: sync-espresso-editions
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run sync
        env:
          AI_ESPRESSO_MANIFEST_URL: ${{ vars.AI_ESPRESSO_MANIFEST_URL }}
        run: |
          set -euo pipefail
          MANIFEST_URL="${AI_ESPRESSO_MANIFEST_URL:-https://raw.githubusercontent.com/jackiehimel/ai-espresso-finalized/main/editions/publish/latest.json}"
          node scripts/sync-espresso-from-manifest.mjs \
            --manifest-url "$MANIFEST_URL"

      - name: Commit and push if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add editions
          if git diff --staged --quiet; then
            echo "No changes under editions/; nothing to commit."
            exit 0
          fi
          git commit -m "chore: sync ai espresso editions from AI-ESPRESSO"
          git push
