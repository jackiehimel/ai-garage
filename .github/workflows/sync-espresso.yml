# clones the digest source repo, runs scripts/sync-espresso.mjs, commits editions/ if changed.
# schedule: daily 14:00 utc (roughly 10am et / 9am cdt); edit cron as needed.
# private source: set repo variable AI_ESPRESSO_REPOSITORY and secret AI_ESPRESSO_CLONE_TOKEN (pat with repo read).

name: Sync AI Espresso editions

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:

concurrency:
  group: sync-espresso-editions
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Clone ai-espresso
        env:
          AI_ESPRESSO_REPOSITORY: ${{ vars.AI_ESPRESSO_REPOSITORY }}
          AI_ESPRESSO_CLONE_TOKEN: ${{ secrets.AI_ESPRESSO_CLONE_TOKEN }}
        run: |
          set -euo pipefail
          REPO="${AI_ESPRESSO_REPOSITORY:-jackiehimel/ai-espresso}"
          DEST="${GITHUB_WORKSPACE}/ai-espresso"
          if [ -n "${AI_ESPRESSO_CLONE_TOKEN:-}" ]; then
            git clone --depth 1 "https://x-access-token:${AI_ESPRESSO_CLONE_TOKEN}@github.com/${REPO}.git" "$DEST"
          else
            git clone --depth 1 "https://github.com/${REPO}.git" "$DEST"
          fi

      - name: Run sync
        run: node scripts/sync-espresso.mjs --source "${GITHUB_WORKSPACE}/ai-espresso"

      - name: Commit and push if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add editions
          if git diff --staged --quiet; then
            echo "No changes under editions/; nothing to commit."
            exit 0
          fi
          git commit -m "chore: sync ai espresso editions from ai-espresso"
          git push
